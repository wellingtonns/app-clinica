name: App Clinica Pipeline

on:
  workflow_dispatch:
    inputs:
      update_kustomize:
        description: Atualizar newTag no repositorio workloads.
        required: false
        type: boolean
        default: false
      deploy:
        description: Aplicar deploy no Kubernetes.
        required: false
        type: boolean
        default: false
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  packages: write
  pull-requests: read

jobs:
  secret-scan:
    uses: wellingtonns/templates-pipeline/.github/workflows/secret-scan.yml@main
    with:
      scan_path: .
      fail_on_leak: true
      scan_history: false
      gitleaks_config_path: .gitleaks.toml
      run_gitleaks: true
      run_trufflehog: true

  pipeline:
    needs: secret-scan
    if: ${{ github.event_name != 'pull_request' }}
    uses: wellingtonns/templates-pipeline/.github/workflows/app-pipeline.yml@main
    with:
      app_name: app-clinica
      stack_type: frontend
      context: .
      image_name: ghcr.io/wellingtonns/app-clinica
      kustomize_repository: wellingtonns/workloads
      kustomize_checkout_path: workloads
      kustomize_path: app/app-clinica
      image_alias: app
      update_kustomize: ${{ github.event_name == 'workflow_dispatch' && inputs.update_kustomize || false }}
      deploy: ${{ github.event_name == 'workflow_dispatch' && inputs.deploy || false }}
      deploy_ref: main
    secrets: inherit
